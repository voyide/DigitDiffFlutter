name: Build Universal Native App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install System Dependencies for code-gen
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build clang

      - name: Install Flutter Rust Bridge CLI
        run: cargo install flutter_rust_bridge_codegen@^2.0.0

      - name: Generate Android Platform Files
        run: |
          # Back up custom files
          cp pubspec.yaml pubspec.yaml.bak
          cp lib/main.dart lib/main.dart.bak
          
          # Generate Android framework
          flutter create --platforms=android .
          
          # Force restore custom files
          mv -f lib/main.dart.bak lib/main.dart
          mv -f pubspec.yaml.bak pubspec.yaml

      - name: Run Dart Dependencies
        run: flutter pub get

      - name: Integrate Rust Engine into Android
        run: |
          flutter_rust_bridge_codegen integrate
          # REMOVE the dummy template FRB auto-generates so it doesn't crash the build
          rm -rf rust/src/api/

      - name: Generate Rust/Dart Bindings natively
        run: flutter_rust_bridge_codegen generate

      - name: Build APK (Release mode)
        run: flutter build apk --release

      - name: Upload Native APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Universal-Sequencer-Native-APK
          path: build/app/outputs/flutter-apk/app-release.apk
