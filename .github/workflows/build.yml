name: Build Universal Native App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install System Dependencies for code-gen
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build clang

      - name: Install Flutter Rust Bridge CLI
        run: cargo install flutter_rust_bridge_codegen@^2.0.0

      - name: Generate Android Platform Files
        run: |
          # Back up our custom files so Flutter doesn't overwrite them
          cp pubspec.yaml pubspec.yaml.bak
          mv lib/main.dart lib/main.dart.bak
          
          # Generate the missing 'android/' folder required for the APK
          flutter create --platforms=android .
          
          # Restore our custom math files
          mv lib/main.dart.bak lib/main.dart
          mv pubspec.yaml.bak pubspec.yaml

      - name: Run Dart Dependencies
        run: flutter pub get

      - name: Integrate Rust Engine into Android
        run: flutter_rust_bridge_codegen integrate

      - name: Generate Rust/Dart Bindings natively
        run: flutter_rust_bridge_codegen generate

      - name: Build APK (Release mode)
        run: flutter build apk --release

      - name: Upload Native APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Universal-Sequencer-Native-APK
          path: build/app/outputs/flutter-apk/app-release.apk
